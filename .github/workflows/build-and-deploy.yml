name: Build and Deploy to Registry

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          MSG="${{ github.event.head_commit.message }}"
          IS_RELEASE=false

          if echo "$MSG" | grep -qE '\[release-(patch|minor|major)\]'; then
            IS_RELEASE=true

            if echo "$MSG" | grep -q '\[release-major\]'; then
              BUMP=major
            elif echo "$MSG" | grep -q '\[release-minor\]'; then
              BUMP=minor
            else
              BUMP=patch
            fi

            git fetch --tags
            LATEST=$(git tag --list 'v*' --sort=-version:refname | head -n 1)
            [ -z "$LATEST" ] && LATEST="v0.0.0"

            VER="${LATEST#v}"
            MAJOR=$(echo "$VER" | cut -d. -f1)
            MINOR=$(echo "$VER" | cut -d. -f2)
            PATCH=$(echo "$VER" | cut -d. -f3)

            if   [ "$BUMP" = "major" ]; then MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
            elif [ "$BUMP" = "minor" ]; then MINOR=$((MINOR+1)); PATCH=0
            else PATCH=$((PATCH+1))
            fi

            VERSION_VALUE="v${MAJOR}.${MINOR}.${PATCH}"
          else
            VERSION_VALUE=$(git rev-parse --short HEAD)
          fi

          echo "value=$VERSION_VALUE" >> "$GITHUB_OUTPUT"
          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION_VALUE (is_release: $IS_RELEASE)"

  build-and-push:
    runs-on: ubuntu-latest
    needs: resolve-version

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Inject Keyring secrets
        id: keyring
        uses: aidenappl/keyring-actions@v1
        with:
          url: ${{ secrets.KEYRING_URL }}
          access-key-id: ${{ secrets.KEYRING_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.KEYRING_SECRET_ACCESS_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Login to Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ env.REGISTRY_URL }}/${{ github.event.repository.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ needs.resolve-version.outputs.version }}
            NEXT_PUBLIC_LATTICE_API=${{ env.NEXT_PUBLIC_LATTICE_API }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Image pushed: ${{ env.REGISTRY_URL }}/${{ github.event.repository.name }}:latest @ ${{ needs.resolve-version.outputs.version }}"

  create-release:
    runs-on: ubuntu-latest
    needs: [resolve-version, build-and-push]
    if: needs.resolve-version.outputs.is_release == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.version }}
          name: ${{ needs.resolve-version.outputs.version }}
          generate_release_notes: true
